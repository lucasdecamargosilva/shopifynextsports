<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camiseta Dry Fit Next Sport - Preview</title>
    <meta property="og:image" content="https://nextsportbr.com/cdn/shop/files/1_f9e5e54e-5e3b-4be2-8dd2-5b0b4cde3c8f.png?v=1738081816&width=800">
    <style>
        body {
            font-family: sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-container {
            background-color: white;
            padding: 30px;
            border: 1px solid #ddd;
            max-width: 800px;
            width: 100%;
            display: flex;
            gap: 30px;
            position: relative;
        }

        .product-single__gallery {
            flex: 1;
            background-color: #f5f5f5;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .product-single__gallery img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1.product__title {
            font-size: 24px;
            margin: 0 0 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .price {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .product__submit__holder {
            margin-top: 10px;
        }

        .product__submit__buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button.product__submit__add {
            padding: 15px;
            background: #000;
            color: #fff;
            border: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="product-container">
        <div class="product-single__gallery">
            <img class="product-single__media" src="https://nextsportbr.com/cdn/shop/files/1_f9e5e54e-5e3b-4be2-8dd2-5b0b4cde3c8f.png?v=1738081816&width=600" alt="Camiseta Dry Fit Next Sport">
        </div>

        <div class="product-info">
            <h1 class="product__title">Camiseta Dry Fit Compressao Next</h1>
            <p class="price">R$ 89,90</p>

            <div style="margin-bottom: 20px;">
                <label>Tamanho:</label>
                <select name="size">
                    <option value="P">P</option>
                    <option value="M">M</option>
                    <option value="G">G</option>
                    <option value="GG">GG</option>
                </select>
            </div>

            <div class="product__submit__holder">
                <div class="product__submit__buttons">
                    <button class="product__submit__add" name="add" data-add-to-cart>Adicionar ao carrinho</button>
                </div>
            </div>

            <div style="margin-top:20px;padding-top:20px;border-top:1px solid #ddd;">
                <label style="font-size:12px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:8px;">Imagem do Produto (teste local)</label>
                <input type="file" id="product-image-upload" accept="image/*" style="font-size:13px;">
            </div>
        </div>
    </div>

    <!-- Script do Provador -->
    <script src="provador-v1.js"></script>
    <script>
        // Permite carregar imagem do produto manualmente para testes locais
        document.getElementById('product-image-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = document.querySelector('.product-single__media');
                if (img) img.src = ev.target.result;
                let meta = document.querySelector('meta[property="og:image"]');
                if (meta) meta.content = ev.target.result;
                window._testProductBlob = file;
            };
            reader.readAsDataURL(file);
        });

        const _origFetch = window.fetch;
        window.fetch = function(url, opts) {
            if (opts && opts.body instanceof FormData && window._testProductBlob) {
                if (opts.body.has('product_image')) {
                    opts.body.set('product_image', window._testProductBlob, 'p.png');
                } else {
                    opts.body.append('product_image', window._testProductBlob, 'p.png');
                }
            }
            return _origFetch.apply(this, arguments);
        };
    </script>

</body>

</html>
